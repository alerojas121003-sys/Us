<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Journal ❤️</title>

<!-- Fonts: elegant handwritten title + soft rounded body -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- html2pdf.js for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --baby-pink:   #FFD6E7;
  --blush:       #F8BBD0;
  --hot-pink:    #FF69B4;
  --rose-gold:   #E8A5B8;
  --white:       #FFFFFF;
  --ink:         #6B3A4E;           /* readable dark rose for text */
  --ink-soft:    #9C6B7E;
  --card-bg:     rgba(255,255,255,.55);
  --card-border: rgba(255,255,255,.75);
  --shadow:      0 10px 30px rgba(232,165,184,.35);
  --radius:      26px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html{ scroll-behavior:smooth; }

body{
  font-family:'Quicksand', sans-serif;
  color:var(--ink);
  min-height:100vh;
  background:
    radial-gradient(1200px 600px at 10% -10%, #FFE9F2 0%, transparent 60%),
    radial-gradient(1000px 700px at 110% 20%, #FDE3EE 0%, transparent 55%),
    linear-gradient(180deg, var(--baby-pink) 0%, #FFF0F6 45%, var(--white) 100%);
  background-attachment:fixed;
  overflow-x:hidden;
}

/* ============================================================
   PROGRESS BAR (fixed on top)
   ============================================================ */
.progress-wrap{
  position:fixed; top:0; left:0; right:0; z-index:50;
  height:14px;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(8px);
}
.progress-bar{
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--blush), var(--hot-pink));
  border-radius:0 999px 999px 0;
  transition:width .5s ease;
}
.progress-label{
  position:fixed; top:20px; right:16px; z-index:50;
  font-size:.75rem; font-weight:700; color:var(--hot-pink);
  background:rgba(255,255,255,.85);
  padding:4px 12px; border-radius:999px;
  box-shadow:var(--shadow);
}

/* ============================================================
   FLOATING HEARTS BACKGROUND
   ============================================================ */
.hearts-bg{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.hearts-bg span{
  position:absolute; bottom:-8vh;
  color:var(--blush);
  opacity:0;
  animation:floatUp linear infinite;
  will-change:transform, opacity;
}
@keyframes floatUp{
  0%   { transform:translateY(0) rotate(0deg) scale(1); opacity:0; }
  10%  { opacity:.55; }
  90%  { opacity:.25; }
  100% { transform:translateY(-115vh) rotate(35deg) scale(1.25); opacity:0; }
}
@media (prefers-reduced-motion: reduce){
  .hearts-bg span{ animation:none; display:none; }
  html{ scroll-behavior:auto; }
}

/* ============================================================
   HEADER
   ============================================================ */
.container{ position:relative; z-index:1; max-width:780px; margin:0 auto; padding:70px 20px 90px; }

header{ text-align:center; margin-bottom:36px; animation:fadeIn 1.2s ease both; }

h1{
  font-family:'Great Vibes', cursive;
  font-weight:400;
  font-size:clamp(2.2rem, 5.5vw, 3.6rem);
  line-height:1.2;
  color:var(--hot-pink);
  text-shadow:0 2px 12px rgba(255,105,180,.25);
}
.subtitle{
  margin-top:16px;
  font-size:1.02rem;
  color:var(--ink-soft);
  max-width:560px;
  margin-left:auto; margin-right:auto;
  line-height:1.65;
}

/* ============================================================
   HEART DIVIDER
   ============================================================ */
.heart-divider{
  display:flex; align-items:center; gap:14px;
  margin:34px 0;
  color:var(--rose-gold);
  font-size:1.05rem;
}
.heart-divider::before, .heart-divider::after{
  content:""; flex:1; height:1.5px;
  background:linear-gradient(90deg, transparent, var(--rose-gold), transparent);
}

/* ============================================================
   QUESTION CARDS (glassmorphism)
   ============================================================ */
.q-card{
  background:var(--card-bg);
  border:1.5px solid var(--card-border);
  border-radius:var(--radius);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:var(--shadow);
  padding:28px 26px;
  margin-bottom:26px;
  animation:fadeIn .8s ease both;
  transition:transform .35s ease, box-shadow .35s ease, border-color .35s ease;
}
.q-card:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 40px rgba(255,105,180,.28);
}
/* Highlight state used when an answer is missing on submit */
.q-card.missing{
  border-color:var(--hot-pink);
  box-shadow:0 0 0 4px rgba(255,105,180,.25), var(--shadow);
  animation:shake .5s ease;
}
@keyframes shake{
  0%,100%{ transform:translateX(0); }
  25%{ transform:translateX(-6px); }
  75%{ transform:translateX(6px); }
}
.q-num{
  display:inline-flex; align-items:center; justify-content:center;
  width:38px; height:38px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--blush), var(--hot-pink));
  color:var(--white); font-weight:700; font-size:.95rem;
  box-shadow:0 4px 12px rgba(255,105,180,.4);
  margin-bottom:12px;
}
.q-text{
  font-size:1.12rem; font-weight:700; line-height:1.55;
  margin-bottom:18px;
}
textarea{
  width:100%;
  min-height:110px;
  resize:none;                     /* auto-grows via JS */
  overflow:hidden;
  font-family:'Quicksand',sans-serif;
  font-size:.98rem; line-height:1.6; color:var(--ink);
  background:rgba(255,255,255,.7);
  border:1.5px solid rgba(232,165,184,.45);
  border-radius:18px;
  padding:14px 16px;
  transition:border-color .3s, box-shadow .3s, background .3s;
}
textarea:focus{
  outline:none;
  border-color:var(--hot-pink);
  background:var(--white);
  box-shadow:0 0 0 4px rgba(255,105,180,.15);
}
textarea::placeholder{ color:#C9A0B0; }
.char-count{
  text-align:right; font-size:.72rem; color:var(--ink-soft);
  margin-top:5px; transition:color .3s;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.actions{ text-align:center; margin-top:44px; }
.btn{
  font-family:'Quicksand',sans-serif;
  border:none; cursor:pointer;
  border-radius:999px;
  font-weight:700;
  transition:transform .3s ease, box-shadow .3s ease, background .3s;
}
.btn-primary{
  font-size:1.3rem;
  padding:18px 58px;
  color:var(--white);
  background:linear-gradient(135deg, var(--hot-pink), #FF8AC5);
  box-shadow:0 10px 28px rgba(255,105,180,.45);
}
.btn-primary:hover{ transform:translateY(-3px) scale(1.03); box-shadow:0 16px 36px rgba(255,105,180,.55); }
.btn-primary:active{ transform:scale(.98); }
.btn-ghost{
  display:block; margin:18px auto 0;
  font-size:.85rem; padding:10px 22px;
  color:var(--ink-soft);
  background:rgba(255,255,255,.6);
  border:1.5px solid rgba(232,165,184,.4);
}
.btn-ghost:hover{ color:var(--hot-pink); border-color:var(--hot-pink); }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{
  position:fixed; inset:0; z-index:100;
  background:rgba(255,214,231,.55);
  backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  opacity:0; pointer-events:none;
  transition:opacity .4s ease;
}
.modal-overlay.show{ opacity:1; pointer-events:auto; }
.modal{
  background:rgba(255,255,255,.92);
  border:1.5px solid var(--card-border);
  border-radius:30px;
  box-shadow:0 24px 60px rgba(255,105,180,.35);
  max-width:440px; width:100%;
  padding:40px 32px;
  text-align:center;
  transform:translateY(24px) scale(.96);
  transition:transform .4s cubic-bezier(.2,.9,.3,1.2);
}
.modal-overlay.show .modal{ transform:translateY(0) scale(1); }
.modal .big-heart{ font-size:3rem; animation:pulse 1.6s ease infinite; display:inline-block; }
@keyframes pulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.15);} }
.modal h2{
  font-family:'Great Vibes',cursive; font-weight:400;
  font-size:2rem; color:var(--hot-pink); margin:12px 0 10px;
  line-height:1.3;
}
.modal p{ color:var(--ink-soft); line-height:1.65; margin-bottom:26px; }
.modal-btns{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.modal-btns .btn{ font-size:.95rem; padding:13px 26px; }
.btn-secondary{
  color:var(--hot-pink);
  background:var(--white);
  border:2px solid var(--blush);
}
.btn-secondary:hover{ border-color:var(--hot-pink); transform:translateY(-2px); }

/* ============================================================
   LOADING OVERLAY (PDF generation)
   ============================================================ */
.loader-overlay{
  position:fixed; inset:0; z-index:200;
  background:rgba(255,240,246,.9);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center; justify-content:center; flex-direction:column; gap:18px;
}
.loader-overlay.show{ display:flex; }
.loader-heart{ font-size:3.2rem; animation:pulse 1s ease infinite; }
.loader-overlay p{ font-weight:700; color:var(--hot-pink); }

/* ============================================================
   HIDDEN PDF TEMPLATE
   ============================================================ */
/* Rendered off-screen (not display:none) so html2canvas can capture it */
#pdf-template{
  position:absolute;
  top:0; left:-10000px;
  width:794px;              /* A4 width at 96dpi */
  background:#FFFFFF;
  visibility:hidden;
}
#pdf-template.rendering{ visibility:visible; }

/* General animations */
@keyframes fadeIn{ from{ opacity:0; transform:translateY(18px);} to{ opacity:1; transform:none;} }

/* Accessibility: visible focus */
.btn:focus-visible{ outline:3px solid var(--hot-pink); outline-offset:2px; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:520px){
  .container{ padding:60px 14px 70px; }
  .q-card{ padding:22px 18px; }
  .btn-primary{ width:100%; padding:16px; }
  .progress-label{ top:22px; }
}
</style>
</head>
<body>

<!-- Progress bar -->
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-label" id="progressLabel">0%</div>

<!-- Floating hearts (generated with JS) -->
<div class="hearts-bg" id="heartsBg" aria-hidden="true"></div>

<div class="container">

  <header>
    <h1>I want this to be what we have always wanted to be ❤️</h1>
    <p class="subtitle">
      Please answer every question honestly. This isn't about proving who's right;
      it's about understanding each other.
    </p>
  </header>

  <div class="heart-divider">♥ ♥ ♥</div>

  <!-- Question cards are generated with JS -->
  <main id="questions"></main>

  <!-- Final buttons -->
  <div class="actions">
    <button class="btn btn-primary" id="doneBtn">Done ❤️</button>
    <button class="btn btn-ghost" id="clearBtn">Clear all answers</button>
  </div>
</div>

<!-- Thank-you modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <span class="big-heart">❤️</span>
    <h2 id="modalTitle">Thank you for opening your heart.</h2>
    <p>I promise to read every word with love. ❤️</p>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="continueBtn">Continue</button>
      <button class="btn btn-primary" id="exportBtn" style="font-size:.95rem;padding:13px 26px;">Export as PDF</button>
    </div>
  </div>
</div>

<!-- Loading overlay for PDF -->
<div class="loader-overlay" id="loaderOverlay">
  <span class="loader-heart">💌</span>
  <p>Creating your journal with love…</p>
</div>

<!-- Hidden template used to build the PDF -->
<div id="pdf-template"></div>

<script>
/* ============================================================
   QUESTIONS
   ============================================================ */
const QUESTIONS = [
  "What makes you feel the most insecure in our relationship?",
  "What specific situations make you lose trust in me?",
  "Is there anything I do without realizing it that feels disrespectful to you?",
  "When you think about Samantha, what exactly makes you uncomfortable or worried?",
  "If I stopped talking to Samantha, do you think that would solve the issue, or is there something deeper?",
  "When you think about Steph, what makes you uncomfortable: her life choices, or the fact that she's my best friend?",
  "Do you feel Steph could somehow influence our relationship? If yes, how?",
  "When you saw my likes on girls' swimsuit posts, what did you think they meant?",
  "What do those likes represent to you emotionally?",
  "When Verónica texted me saying she missed me, what hurt you the most?",
  "What would you have wanted me to do differently in that situation?",
  "Are there any boundaries with other women that you'd like us to agree on together?",
  "What do I do that makes you feel loved and emotionally safe?",
  "What do I do that makes you feel insecure or unappreciated?",
  "When you say I become difficult sometimes, what exactly changes?",
  "When you're having a bad day, what do you wish I would do that I don't currently do?",
  "Have you ever felt alone within our relationship? Tell me about that moment.",
  "What could I do consistently to help you feel more secure without you having to ask?",
  "Is there something you've never told me because you were afraid of how I'd react?",
  "What are the things I do that make you genuinely happy?",
  "What do you think BOTH of us should improve to make this relationship healthier?",
  "If you could summarize everything you need from me in one sentence, what would it be?"
];

const MAX_CHARS = 2000;

/* ============================================================
   STORAGE — localStorage with in-memory fallback.
   (When the file is opened in a normal browser, everything is
   saved and restored automatically on refresh.)
   ============================================================ */
const memoryStore = {};
const store = {
  get(key){
    try { return localStorage.getItem(key); } catch(e){ return memoryStore[key] ?? null; }
  },
  set(key, val){
    try { localStorage.setItem(key, val); } catch(e){ memoryStore[key] = val; }
  },
  remove(key){
    try { localStorage.removeItem(key); } catch(e){ delete memoryStore[key]; }
  }
};
const STORE_PREFIX = "loveJournal_";

/* ============================================================
   BUILD THE QUESTION CARDS
   ============================================================ */
const questionsEl = document.getElementById("questions");

QUESTIONS.forEach((q, i) => {
  const card = document.createElement("section");
  card.className = "q-card";
  card.id = "card_" + i;
  card.style.animationDelay = (i * 0.03) + "s";
  card.innerHTML = `
    <span class="q-num">${i + 1}</span>
    <p class="q-text">${q}</p>
    <textarea id="a_${i}" maxlength="${MAX_CHARS}"
      placeholder="Write from the heart…"></textarea>
    <div class="char-count" id="cc_${i}">0 / ${MAX_CHARS}</div>
  `;
  questionsEl.appendChild(card);

  // Heart divider every 4 cards
  if ((i + 1) % 4 === 0 && i < QUESTIONS.length - 1) {
    const div = document.createElement("div");
    div.className = "heart-divider";
    div.textContent = "♥";
    questionsEl.appendChild(div);
  }
});

/* ============================================================
   TEXTAREAS: auto-grow, counter, autosave, progress
   ============================================================ */
const allTextareas = QUESTIONS.map((_, i) => document.getElementById("a_" + i));

function autoGrow(ta){
  ta.style.height = "auto";
  ta.style.height = (ta.scrollHeight + 2) + "px";
}

function updateCounter(ta, i){
  const cc = document.getElementById("cc_" + i);
  cc.textContent = `${ta.value.length} / ${MAX_CHARS}`;
  cc.style.color = ta.value.length > MAX_CHARS * 0.9 ? "var(--hot-pink)" : "";
}

function updateProgress(){
  const filled = allTextareas.filter(t => t.value.trim().length > 0).length;
  const pct = Math.round((filled / allTextareas.length) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = pct + "%";
}

allTextareas.forEach((ta, i) => {
  ta.addEventListener("input", () => {
    autoGrow(ta);
    updateCounter(ta, i);
    updateProgress();
    ta.closest(".q-card").classList.remove("missing");   // clear highlight once typing
    store.set(STORE_PREFIX + "a_" + i, ta.value);        // autosave
  });
});

/* ============================================================
   RESTORE SAVED ANSWERS
   ============================================================ */
(function restore(){
  allTextareas.forEach((ta, i) => {
    const saved = store.get(STORE_PREFIX + "a_" + i);
    if (saved){
      ta.value = saved;
      autoGrow(ta);
      updateCounter(ta, i);
    }
  });
  updateProgress();
})();

/* ============================================================
   FLOATING HEARTS
   ============================================================ */
(function makeHearts(){
  const bg = document.getElementById("heartsBg");
  const symbols = ["❤", "💗", "💕", "♥", "💖"];
  for (let i = 0; i < 16; i++){
    const s = document.createElement("span");
    s.textContent = symbols[i % symbols.length];
    s.style.left = Math.random() * 100 + "vw";
    s.style.fontSize = (0.8 + Math.random() * 1.6) + "rem";
    s.style.animationDuration = (9 + Math.random() * 12) + "s";
    s.style.animationDelay = (Math.random() * 12) + "s";
    bg.appendChild(s);
  }
})();

/* ============================================================
   "DONE" BUTTON — validate all answers are filled
   ============================================================ */
const modalOverlay = document.getElementById("modalOverlay");

document.getElementById("doneBtn").addEventListener("click", () => {
  // Find the first unanswered question
  const firstEmptyIndex = allTextareas.findIndex(t => t.value.trim().length === 0);

  if (firstEmptyIndex !== -1){
    // Smoothly scroll to it and highlight it
    const card = document.getElementById("card_" + firstEmptyIndex);
    card.classList.remove("missing");
    void card.offsetWidth;               // restart the shake animation
    card.classList.add("missing");
    card.scrollIntoView({ behavior:"smooth", block:"center" });
    setTimeout(() => allTextareas[firstEmptyIndex].focus({ preventScroll:true }), 600);
    return;
  }

  // All answered — show the thank-you modal
  modalOverlay.classList.add("show");
});

document.getElementById("continueBtn").addEventListener("click", () => {
  modalOverlay.classList.remove("show");
});
modalOverlay.addEventListener("click", e => {
  if (e.target === modalOverlay) modalOverlay.classList.remove("show");
});

/* ============================================================
   CLEAR ALL (with confirmation)
   ============================================================ */
document.getElementById("clearBtn").addEventListener("click", () => {
  if (!confirm("Are you sure you want to clear all answers? This cannot be undone.")) return;
  allTextareas.forEach((ta, i) => {
    ta.value = "";
    autoGrow(ta);
    updateCounter(ta, i);
    ta.closest(".q-card").classList.remove("missing");
    store.remove(STORE_PREFIX + "a_" + i);
  });
  updateProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

/* ============================================================
   PDF EXPORT — dedicated romantic template
   ============================================================ */
function escapeHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function buildPdfHtml(){
  const date = new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });

  let body = "";
  QUESTIONS.forEach((q, i) => {
    const a = allTextareas[i].value.trim();
    body += `
      <div style="page-break-inside:avoid; margin-bottom:20px; border:1.5px solid #F8BBD0; border-radius:16px; padding:16px 18px; background:#FFF8FB;">
        <div style="font-weight:700; color:#FF69B4; font-size:11px; margin-bottom:6px;">Question ${i+1} &nbsp;♥</div>
        <div style="font-weight:700; color:#6B3A4E; font-size:13px; line-height:1.5; margin-bottom:10px;">${escapeHtml(q)}</div>
        <div style="font-size:12px; color:#6B3A4E; line-height:1.65; white-space:pre-wrap; border-left:3px solid #FFD6E7; padding-left:12px;">${escapeHtml(a)}</div>
      </div>`;
  });

  return `
    <div style="font-family:'Quicksand',sans-serif; padding:26px 30px; background:#FFFFFF;">
      <!-- Pink header with hearts and decorative border -->
      <div style="background:linear-gradient(135deg,#FFD6E7,#F8BBD0); border:2px solid #E8A5B8; border-radius:20px; text-align:center; padding:26px 20px; margin-bottom:8px;">
        <div style="font-size:20px; letter-spacing:6px;">💕 ❤️ 💕</div>
        <div style="font-family:'Great Vibes',cursive; font-size:28px; color:#FF69B4; margin:10px 0 6px; line-height:1.3;">I want this to be what we have always wanted to be ❤️</div>
        <div style="font-size:12px; color:#9C6B7E; line-height:1.6; max-width:440px; margin:0 auto;">
          Please answer every question honestly. This isn't about proving who's right; it's about understanding each other.
        </div>
        <div style="font-size:11px; color:#9C6B7E; margin-top:10px;">${date}</div>
      </div>
      <div style="text-align:center; color:#E8A5B8; font-size:13px; margin:10px 0 16px;">— ♥ — ♥ — ♥ —</div>
      ${body}
      <div style="text-align:center; margin-top:24px; padding-top:14px; border-top:1.5px solid #F8BBD0; color:#FF69B4; font-size:12px; font-weight:700;">
        Made with love ❤️
      </div>
    </div>`;
}

document.getElementById("exportBtn").addEventListener("click", async () => {
  modalOverlay.classList.remove("show");
  const loader = document.getElementById("loaderOverlay");
  loader.classList.add("show");

  const template = document.getElementById("pdf-template");
  template.innerHTML = buildPdfHtml();
  template.classList.add("rendering");

  // html2canvas captures with the page's current scroll offset, which
  // produces a blank canvas when the user is scrolled down. Scroll to
  // the top first and force offsets to zero in the options below.
  const prevScroll = window.scrollY;
  window.scrollTo(0, 0);
  await new Promise(r => setTimeout(r, 350));   // let layout + fonts settle

  try {
    await html2pdf().set({
      margin:       [8, 8, 10, 8],
      filename:     "our-love-journal.pdf",
      image:        { type: "jpeg", quality: 0.96 },
      html2canvas:  {
        scale: 2,
        useCORS: true,
        backgroundColor: "#FFFFFF",
        scrollX: 0,
        scrollY: 0,
        windowWidth: 794,
        width: 794
      },
      jsPDF:        { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak:    { mode: ["css", "legacy"] }
    }).from(template).save();
  } catch (err) {
    alert("Could not generate the PDF: " + err.message);
  } finally {
    template.classList.remove("rendering");
    template.innerHTML = "";
    loader.classList.remove("show");
    window.scrollTo(0, prevScroll);
  }
});
</script>
</body>
</html>
